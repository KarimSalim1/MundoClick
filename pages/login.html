<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="/assets/img/logo_MC.png" type="image/x-icon">
  <title>Iniciar Sesión - MundoClick</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
</head>
<body>
  <main class="fondo-login">
    <section class="tarjeta-login">
      <div class="login-izquierda">
        <img src="/assets/img/logo_MC.png" alt="Logo MundoClick">
        <h1>MundoClick</h1>
        <p>Conectamos tecnología con personas</p>
      </div>
      <div class="login-derecha">
        <h2>Iniciar sesión</h2>
        <form class="formulario-login" action="#" method="post">
          <div class="campo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com" required>
          </div>

          <div class="campo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>

          <div class="recordar">
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn-login">Ingresar</button>

          <div class="division">
            <span>o continuar con</span>
          </div>

          <div class="redes-login">
            <button type="button" class="google"><i class="fab fa-google"></i></button>
            <button type="button" class="facebook"><i class="fab fa-facebook-f"></i></button>
            <button type="button" class="apple"><i class="fab fa-apple"></i></button>
          </div>
          

          <p class="ir-registro">¿No tenés cuenta? <a href="/pages/register.html">Registrate</a></p>
          
          
        </form>
      </div>
    </section>
  </main>
</body>
</html>
