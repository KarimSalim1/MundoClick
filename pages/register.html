<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="/assets/img/logo_MC.png" type="image/x-icon">
  <title>Registro - MundoClick</title>
    <link rel="stylesheet" href="/css/register.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <main>
        <div class="register-container">
            <div class="register-image">
            <img src="../assets/img/logo_MC.png" alt="Logo MundoClick" />
            </div>
            <form class="register-form">
            <h2>Crear una cuenta</h2>
            <p class="slogan">Tu experiencia comienza aquí. Registrate y descubrí todo lo que MundoClick tiene para vos.</p>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Nombre y Apellido *" required />
            </div>

            <div class="input-group">
                <i class="fas fa-user-circle"></i>
                <input type="text" placeholder="Nombre de usuario *" required />
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Email *" required />
            </div>

            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="number" placeholder="Teléfono *" required />
            </div>

            <div class="input-group">
                <i class="fas fa-home"></i>
                <input type="text" placeholder="Domicilio *" required />
            </div>

            <div class="input-group">
                <i class="fas fa-mail-bulk"></i>
                <input type="number" placeholder="Código Postal *" required />
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Contraseña *" required minlength="8" />
                <span class="toggle-password">Mostrar</span>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirm-password" placeholder="Confirmar contraseña *" required />
            </div>

            
            <!-- Fragmento para agregar al final del formulario de registro -->
                                            
        <div class="terms">
            <input type="checkbox" id="aceptar-terminos" required />
            <label for="aceptar-terminos">
                Acepto los <a href="#">Términos y Condiciones</a> de MundoClick
            </label>
        </div>

        

         <button type="submit">Registrarte</button>
         
    </main>


</body>
</html>
